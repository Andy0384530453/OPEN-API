openapi: 3.1.0

info:
  title: Ingredient-openapi
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:

  /ingredients/{id}:
    get:
      description: return ingredient by id
      operationId: getIngredientById

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
              example:
                id: 1
                name: Laitue
                price: 800
                category: VEGETABLE

        "404":
          description: Ingredient not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Ingredient.id=5 is not found"
                status: 404
  
  /ingredients/{id}/stockMovements:
    get:
      description: return the list of stock movements for a specific ingredient
      operationId: getStockMovements

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

        - name: at
          in: query
          required: true
          schema:
            type: string
            format: date-time

        - name: unit
          in: query
          required: true
          schema:
            type: string
            enum: [PCS, KG, L]

      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockMovement'
              example:
                - id: 1
                  quantity: 5.0
                  type: IN
                  unit: KG
                  creationDatetime: 2024-01-05T08:00:00

        "400":
          description: Missing required query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Either mandatory query parameter 'at' or 'unit' is not provided"
                status: 400

        "404":
          description: Ingredient not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Ingredient.id=7 is not found"
                status: 404


components:

  schemas:

    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        category:
          type: string
          enum: [VEGETABLE, ANIMAL, OTHER, DAIRY]

    StockMovement:
      type: object
      properties:
        id:
          type: integer

        quantity:
          type: number

        type:
          type: string
          enum: [IN, OUT]

        unit:
          type: string
          enum: [PCS, KG, L]

        creationDatetime:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer